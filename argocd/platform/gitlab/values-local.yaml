global:
  edition: ce
  kas:
    enabled: false
  registry:
    enabled: false
  hosts:
    domain: 192.168.33.100.nip.io
    # TLS est terminé par Traefik Gateway sur le LoadBalancer. GitLab doit
    # tout de même annoncer son URL publique en https pour OAuth, callbacks
    # et cookies de session.
    https: true
  ingress:
    enabled: false
    configureCertmanager: false
  rails:
    bootsnap:
      enabled: false
  appConfig:
    object_store:
      enabled: true
      proxy_download: true
    defaultProjectsFeatures:
      containerRegistry: false
    lfs:
      enabled: false
    artifacts:
      enabled: true
      proxy_download: true
      bucket: gitlab-artifacts
    uploads:
      enabled: false
    packages:
      enabled: false
  webservice:
    # Puma tue un worker après 60s par défaut ; sur ce cluster arm64
    # mono-noeud, des requêtes lourdes (1er boot, imports) dépassent
    # ce délai sous charge CPU contrainte sans être réellement bloquées.
    workerTimeout: 120
  minio:
    enabled: true
  pages:
    objectStore:
      enabled: false
minio:
  # arm64 nodes cannot run the 2017/2018 amd64-only GitLab mirror images;
  # these versions support arm64 and still expose the old mc policy/config API.
  image: minio/minio
  imageTag: RELEASE.2022-09-17T00-09-45Z
  minioMc:
    image: minio/mc
    tag: RELEASE.2022-09-16T09-16-47Z
installCertmanager: false
# ArgoCD exécute les hooks "pre-upgrade" dès le premier sync (il ne distingue
# pas install vs upgrade comme le ferait `helm install`), ce qui fait échouer
# ce job sur un cluster neuf faute de ConfigMap "chart-info" préexistante.
upgradeCheck:
  enabled: false
nginx-ingress:
  enabled: false
prometheus:
  install: false
# Le token d'authentification du runner n'est pas en clair ici : il est
# généré dynamiquement via l'API GitLab par `make gitlab-runner-token`
# (scripts/gitlab-runner-token.sh) et stocké dans le Secret K8s
# gitlab-gitlab-runner-secret effectivement monté par le chart.
gitlab-runner:
  install: true
  # Le runner reste in-cluster et parle au webservice GitLab en HTTP interne.
  # L'URL publique GitLab, elle, est servie en HTTPS par Traefik.
  gitlabUrl: http://gitlab-webservice-default.gitlab.svc.cluster.local:8181/
  rbac:
    create: true
  runners:
    config: |
      [[runners]]
        # Le serveur renvoie l'URL externe (gitlab.192.168.33.100.nip.io) pour le
        # clone, injoignable depuis l'intérieur du cluster (127.0.0.1 = le pod
        # lui-même) : on force l'URL in-cluster utilisée pour le `git clone`.
        clone_url = "http://gitlab-webservice-default.gitlab.svc.cluster.local:8181"
        [runners.kubernetes]
          namespace = "{{.Release.Namespace}}"
          image = "alpine:latest"
          # Le nœud est arm64 (Apple Silicon) ; sans cette valeur explicite,
          # le runner essaie de tirer le helper en x86_64 et échoue.
          helper_image = "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:arm64-v18.11.2"
          cpu_request = "100m"
          memory_request = "128Mi"
          cpu_limit = "500m"
          memory_limit = "512Mi"
registry:
  enabled: false
gitlab:
  migrations:
    enabled: true
  webservice:
    minReplicas: 1
    maxReplicas: 1
    # GitLab defaults to 2 Puma workers. On this local POC cluster each
    # worker is close to 900Mi at boot, so a single worker is much more
    # stable while still being enough for interactive usage and seeding.
    workerProcesses: 1
    resources:
      requests:
        cpu: 300m
        memory: 1400Mi
    deployment:
      # >= workhorse.shutdownTimeout (workerTimeout+1=121s), avec marge.
      terminationGracePeriodSeconds: 150
      livenessProbe:
        initialDelaySeconds: 60
        timeoutSeconds: 30
        failureThreshold: 5
      readinessProbe:
        initialDelaySeconds: 30
        timeoutSeconds: 10
        failureThreshold: 5
    workhorse:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
      livenessProbe:
        initialDelaySeconds: 60
        timeoutSeconds: 30
        failureThreshold: 5
      readinessProbe:
        initialDelaySeconds: 30
        timeoutSeconds: 10
        failureThreshold: 5
  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    # The chart default is 20 threads, which is excessive for the POC and
    # drives avoidable memory spikes from background jobs.
    concurrency: 5
    resources:
      requests:
        cpu: 300m
        memory: 900Mi
  gitlab-exporter:
    enabled: false
  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
  toolbox:
    enabled: false
