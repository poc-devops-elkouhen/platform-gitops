# Crée le secret gitlab-tf-credentials en flux-system avec un PAT GitLab root.
# Utilise le même mécanisme OAuth2 que gitlab-seed.py.
# Idempotent : le Job s'arrête immédiatement si le secret existe déjà.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tf-credentials-creator
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf-credentials-read-gitlab-secret
  namespace: gitlab
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gitlab-gitlab-initial-root-password"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-credentials-read-gitlab-secret
  namespace: gitlab
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tf-credentials-read-gitlab-secret
subjects:
  - kind: ServiceAccount
    name: tf-credentials-creator
    namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf-credentials-write
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-credentials-write
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tf-credentials-write
subjects:
  - kind: ServiceAccount
    name: tf-credentials-creator
    namespace: flux-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tf-credentials-creator
  namespace: flux-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: tf-credentials-creator
      restartPolicy: Never
      containers:
        - name: create-credentials
          image: python:3.11-slim
          command:
            - python3
            - -c
            - |
              import base64, json, ssl, sys, urllib.request, urllib.parse, urllib.error

              GITLAB_INTERNAL = "http://gitlab-webservice-default.gitlab.svc:8181"
              SECRET_NAME = "gitlab-tf-credentials"
              NS = "flux-system"
              KUBE_API = "https://kubernetes.default.svc"

              with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as f:
                  SA_TOKEN = f.read().strip()
              ssl_ctx = ssl.create_default_context(
                  cafile="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              )

              def k8s(method, path, body=None):
                  data = json.dumps(body).encode() if body else None
                  req = urllib.request.Request(
                      f"{KUBE_API}{path}", data=data, method=method,
                      headers={
                          "Authorization": f"Bearer {SA_TOKEN}",
                          "Content-Type": "application/json",
                          "Accept": "application/json",
                      },
                  )
                  try:
                      with urllib.request.urlopen(req, context=ssl_ctx) as r:
                          return json.loads(r.read()), r.status
                  except urllib.error.HTTPError as e:
                      return json.loads(e.read()), e.code

              # Idempotent : skip si le secret existe déjà
              _, status = k8s("GET", f"/api/v1/namespaces/{NS}/secrets/{SECRET_NAME}")
              if status == 200:
                  print("Secret already exists, nothing to do.")
                  sys.exit(0)

              # Récupère le mot de passe root depuis le secret GitLab
              secret, _ = k8s("GET", "/api/v1/namespaces/gitlab/secrets/gitlab-gitlab-initial-root-password")
              password = base64.b64decode(secret["data"]["password"]).decode()

              # OAuth2 Resource Owner Password Credentials (même mécanisme que gitlab-seed.py)
              data = urllib.parse.urlencode({
                  "grant_type": "password",
                  "username": "root",
                  "password": password,
              }).encode()
              req = urllib.request.Request(f"{GITLAB_INTERNAL}/oauth/token", data=data)
              with urllib.request.urlopen(req) as resp:
                  oauth = json.loads(resp.read())
              oauth_token = oauth["access_token"]

              # Crée un PAT pour le provider Terraform
              pat_data = json.dumps({
                  "name": "terraform-controller",
                  "scopes": ["api", "read_repository", "write_repository"],
              }).encode()
              req = urllib.request.Request(
                  f"{GITLAB_INTERNAL}/api/v4/users/1/personal_access_tokens",
                  data=pat_data,
                  headers={
                      "Authorization": f"Bearer {oauth_token}",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  pat = json.loads(resp.read())
              token = pat["token"]

              # Stocke le token en tant que secret K8s (utilisé par tf-controller)
              _, status = k8s("POST", f"/api/v1/namespaces/{NS}/secrets", {
                  "apiVersion": "v1",
                  "kind": "Secret",
                  "metadata": {"name": SECRET_NAME, "namespace": NS},
                  "stringData": {
                      "gitlab_token": token,
                      "username": "oauth2",
                      "password": token,
                  },
              })
              if status == 201:
                  print("Secret created successfully.")
              else:
                  print(f"Failed to create secret, HTTP {status}", file=sys.stderr)
                  sys.exit(1)
