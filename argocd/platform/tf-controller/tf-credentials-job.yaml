# Crée le secret gitlab-tf-credentials en flux-system avec un PAT GitLab root.
# Utilise le même mécanisme OAuth2 que gitlab-seed.py.
# Idempotent : le Job s'arrête immédiatement si le secret existe déjà.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tf-credentials-creator
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf-credentials-read-gitlab-secret
  namespace: gitlab
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gitlab-gitlab-initial-root-password"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-credentials-read-gitlab-secret
  namespace: gitlab
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tf-credentials-read-gitlab-secret
subjects:
  - kind: ServiceAccount
    name: tf-credentials-creator
    namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf-credentials-write
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-credentials-write
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tf-credentials-write
subjects:
  - kind: ServiceAccount
    name: tf-credentials-creator
    namespace: flux-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tf-credentials-creator
  namespace: flux-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: tf-credentials-creator
      restartPolicy: Never
      containers:
        - name: create-credentials
          image: python:3.11-slim
          command:
            - python3
            - -c
            - |
              import json, subprocess, sys, urllib.request, urllib.parse

              GITLAB_INTERNAL = "http://gitlab-webservice-default.gitlab.svc:8181"
              SECRET_NAME = "gitlab-tf-credentials"
              NS = "flux-system"

              def kubectl(*args):
                  r = subprocess.run(["kubectl"] + list(args), capture_output=True, text=True)
                  return r.stdout.strip(), r.returncode

              # Idempotent : skip si le secret existe déjà
              _, rc = kubectl("get", "secret", SECRET_NAME, "-n", NS)
              if rc == 0:
                  print("Secret already exists, nothing to do.")
                  sys.exit(0)

              # Récupère le mot de passe root depuis le secret GitLab
              password_b64, _ = kubectl(
                  "-n", "gitlab", "get", "secret",
                  "gitlab-gitlab-initial-root-password",
                  "-o", "jsonpath={.data.password}"
              )
              import base64
              password = base64.b64decode(password_b64).decode()

              # OAuth2 Resource Owner Password Credentials (même mécanisme que gitlab-seed.py)
              data = urllib.parse.urlencode({
                  "grant_type": "password",
                  "username": "root",
                  "password": password,
              }).encode()
              req = urllib.request.Request(f"{GITLAB_INTERNAL}/oauth/token", data=data)
              with urllib.request.urlopen(req) as resp:
                  oauth = json.loads(resp.read())
              oauth_token = oauth["access_token"]

              # Crée un PAT pour le provider Terraform
              pat_data = json.dumps({
                  "name": "terraform-controller",
                  "scopes": ["api", "read_repository", "write_repository"],
              }).encode()
              req = urllib.request.Request(
                  f"{GITLAB_INTERNAL}/api/v4/users/1/personal_access_tokens",
                  data=pat_data,
                  headers={
                      "Authorization": f"Bearer {oauth_token}",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  pat = json.loads(resp.read())
              token = pat["token"]

              # Stocke le token en tant que secret K8s (utilisé par tf-controller)
              subprocess.run([
                  "kubectl", "-n", NS, "create", "secret", "generic", SECRET_NAME,
                  f"--from-literal=gitlab_token={token}",
                  f"--from-literal=username=oauth2",
                  f"--from-literal=password={token}",
              ], check=True)
              print("Secret created successfully.")
