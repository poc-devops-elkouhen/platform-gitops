---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: terraform-runner
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
# Permissions pour le backend Kubernetes : state stocké en secrets tfstate-*
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: terraform-runner
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "delete", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: terraform-runner
  namespace: flux-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: terraform-runner
subjects:
  - kind: ServiceAccount
    name: terraform-runner
    namespace: flux-system
