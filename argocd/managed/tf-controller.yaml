apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tf-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Doit syncer après flux-source-controller (CRDs GitRepository disponibles)
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://flux-iac.github.io/tofu-controller/
      chart: tofu-controller
      targetRevision: 0.16.0
      helm:
        releaseName: tf-controller
        values: |
          replicaCount: 1
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m

          # Désactive le source-controller embarqué : on utilise celui de flux2
          sourceController:
            deploy: false

          # Image runner explicite : évite la résolution via OCIRepository
          runner:
            image:
              repository: ghcr.io/flux-iac/tofu-runner
              tag: v1.6.2
            resources:
              requests:
                memory: 64Mi
                cpu: 100m
              limits:
                memory: 512Mi
                cpu: 500m

          # Branch planner non requis pour ce POC
          branchPlanner:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: flux-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
