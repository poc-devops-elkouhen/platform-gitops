apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tf-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Doit syncer après flux-source-controller (CRDs GitRepository disponibles)
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  # source: singulier (pas sources:) pour qu'ArgoCD installe les CRDs Helm
  source:
    repoURL: https://flux-iac.github.io/tofu-controller/
    chart: tofu-controller
    targetRevision: 0.16.4
    helm:
      releaseName: tf-controller
      values: |
        replicaCount: 1
        resources:
          requests:
            memory: 64Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 500m

        awsPackage:
          install: false

        runner:
          image:
            repository: ghcr.io/flux-iac/tf-runner
            tag: v0.16.4
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

        branchPlanner:
          enabled: false

        # Pas de notification-controller dans ce cluster
        eventsAddress: ""

        # readOnlyRootFilesystem: true mais pas d'emptyDir → /tmp illisible
        volumes:
          - name: tmp
            emptyDir: {}
        volumeMounts:
          - name: tmp
            mountPath: /tmp
  destination:
    server: https://kubernetes.default.svc
    namespace: flux-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
