stages:
  - onboard

# Les PR/MR sur platform-gitops se font directement sur ce projet GitLab (pas
# sur GitHub) : ce pipeline se déclenche nativement au merge sur main, sans
# délai de mirror. Il régénère les manifests ArgoCD (platform-cicd) et la
# liste des projets GitLab (toolbox), commit sur ce même projet (le push
# mirror gitlab_project_mirror.platform_gitops_to_github propage ensuite vers
# GitHub, dépôt surveillé par ArgoCD/Flux), et pousse directement vers GitHub
# pour gitlab-projects-iac (qui n'a pas d'équivalent GitLab).
onboard-apps:
  stage: onboard
  image: python:3.12-slim
  rules:
    # CI_JOB_TOKEN est en lecture seule sur les pipelines de MR (protection
    # anti-privilege-escalation) : le job ne peut pousser sur main que sur le
    # pipeline de branche declenche apres le merge, pas sur celui de la MR.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - argocd/apps/**/*
  variables:
    GIT_STRATEGY: clone
  before_script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null
    - git config --global user.name "gitops-bot"
    - git config --global user.email "gitops-bot@users.noreply.github.com"
  script:
    - git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/poc-devops-elkouhen/platform-cicd.git" /tmp/platform-cicd
    - git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/poc-devops-elkouhen/toolbox.git" /tmp/toolbox
    - git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/poc-devops-elkouhen/gitlab-projects-iac.git" /tmp/gitlab-projects-iac
    - pip install -q -r /tmp/platform-cicd/requirements.txt -r /tmp/toolbox/requirements.txt
    - python3 /tmp/platform-cicd/scripts/render-argocd-apps.py --apps-file "${CI_PROJECT_DIR}/argocd/apps.yaml"
    - python3 /tmp/toolbox/scripts/render-gitlab-projects.py --apps-file "${CI_PROJECT_DIR}/argocd/apps.yaml" --output /tmp/gitlab-projects-iac/terraform/apps.auto.tfvars.json
    - |
      if [ -n "$(git status --porcelain -- argocd/generated argocd/managed)" ]; then
        git add argocd/generated argocd/managed
        git commit -m "chore(argocd): regenerate app manifests [bot]"
        # ${CI_SERVER_HOST} est l'URL externe (gitlab.192.168.33.100.nip.io),
        # TLS self-signed non approuvé par le conteneur du job : on pousse via
        # l'URL in-cluster HTTP, comme le clone_url du runner (values-local.yaml).
        git remote set-url origin "http://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab-webservice-default.gitlab.svc.cluster.local:8181/${CI_PROJECT_PATH}.git"
        git push origin HEAD:main
      else
        echo "Rien a regenerer cote platform-gitops."
      fi
    - |
      cd /tmp/gitlab-projects-iac
      if [ -n "$(git status --porcelain -- terraform/apps.auto.tfvars.json)" ]; then
        git add terraform/apps.auto.tfvars.json
        git commit -m "chore(terraform): sync apps from platform-gitops [bot]"
        git push "https://x-access-token:${GITHUB_TOKEN}@github.com/poc-devops-elkouhen/gitlab-projects-iac.git" HEAD:main
      else
        echo "Rien a synchroniser cote gitlab-projects-iac."
      fi
